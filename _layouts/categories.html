---
layout: default
---

<div class="listing-page">
  <h1 class="listing-title">Topics</h1>
  <div class="tag-cloud">
    {% for category in site.categories %}
      <a href="{{ site.baseurl }}/categories/{{ category[0] | slugify }}/" class="tag-pill">
        {{ category[0] }}<span class="tag-count">{{ category[1].size }}</span>
      </a>
    {% endfor %}
  </div>
</div>
