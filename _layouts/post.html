---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% if page.categories %}
        <span class="categories">
          {% for category in page.categories %}
            <a href="{{ site.baseurl }}/categories/{{ category | slugify }}/">{{ category }}</a>
          {% endfor %}
        </span>
      {% endif %}
      {% if page.tags %}
        <span class="tags">
          {% for tag in page.tags %}
            <a href="{{ site.baseurl }}/tags/{{ tag | slugify }}/">{{ tag }}</a>
          {% endfor %}
        </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
body {
  font-family: Arial, sans-serif;
  line-height: 1.6;
  color: #333;
  background-color: #fff;
  margin: 0;
  padding: 20px;
}

.post-header {
  border-bottom: 1px solid #ccc;
  padding-bottom: 10px;
  margin-bottom: 20px;
}

.post-title {
  font-size: 2em;
  margin: 0;
  color: #000;
}

.post-meta {
  font-size: 0.9em;
  color: #666;
}

.post-meta a {
  color: #0066cc;
  text-decoration: none;
}

.post-meta a:hover {
  text-decoration: underline;
}

.post-content {
  max-width: 800px;
}

.post-content h1, .post-content h2, .post-content h3 {
  color: #000;
}

.post-content a {
  color: #0066cc;
}

.post-content code {
  background-color: #f4f4f4;
  padding: 2px 4px;
  border-radius: 3px;
}

.post-content pre {
  background-color: #f4f4f4;
  padding: 10px;
  border-radius: 5px;
  overflow-x: auto;
}

.post-content blockquote {
  border-left: 4px solid #ccc;
  padding-left: 10px;
  color: #666;
}
</style>
