---
layout: default
---

<div class="listing-page">
  <h1 class="listing-title">Tags</h1>
  <div class="tag-cloud">
    {% for tag in site.tags %}
      <a href="{{ site.baseurl }}/tags/{{ tag[0] | slugify }}/" class="tag-pill">
        {{ tag[0] }}<span class="tag-count">{{ tag[1].size }}</span>
      </a>
    {% endfor %}
  </div>
</div>
