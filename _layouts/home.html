---
layout: default
---

<div class="home">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>

  <div class="posts">
    {% for post in site.posts %}
      <article class="post-preview">
        <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time>
        <p>{{ post.excerpt }}</p>
      </article>
    {% endfor %}
  </div>
</div>

<style>
body {
  font-family: Arial, sans-serif;
  line-height: 1.6;
  color: #333;
  background-color: #fff;
  margin: 0;
  padding: 20px;
}

.home h1 {
  color: #000;
  border-bottom: 1px solid #ccc;
  padding-bottom: 10px;
}

.posts {
  max-width: 800px;
}

.post-preview {
  margin-bottom: 20px;
  border-bottom: 1px solid #eee;
  padding-bottom: 10px;
}

.post-preview h2 {
  margin: 0;
  font-size: 1.5em;
}

.post-preview h2 a {
  color: #000;
  text-decoration: none;
}

.post-preview h2 a:hover {
  color: #0066cc;
}

.post-preview time {
  font-size: 0.9em;
  color: #666;
}

.post-preview p {
  color: #333;
}
</style>
